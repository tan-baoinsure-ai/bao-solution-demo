<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bảnh Barber — A Gentleman's Retreat</title>
<link rel="stylesheet" href="styles-classic.css" />
<style>
  html, body { margin: 0; padding: 0; background: #0e0c0a; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #e8dcc4; }
  /* Landing page: let the classic root flow as a normal page */
  .classic-root { width: 100% !important; min-height: 0 !important; }
  /* Responsive scale-down for narrower viewports */
  @media (max-width: 1200px) {
    .c-hero { padding: 80px 48px 100px !important; }
    .c-section { padding: 96px 48px !important; }
    .c-footer { padding: 64px 48px 32px !important; }
    .c-nav { padding: 24px 48px !important; }
    .c-hero-title { font-size: 88px !important; }
    .c-section-title { font-size: 60px !important; }
  }
  @media (max-width: 900px) {
    .c-hero { padding: 60px 32px 80px !important; grid-template-columns: 1fr !important; }
    .c-section { padding: 72px 32px !important; }
    .c-footer { padding: 56px 32px 28px !important; }
    .c-nav { padding: 18px 32px !important; }
    .c-nav-links { display: none !important; }
    .c-hero-title { font-size: 64px !important; }
    .c-section-title { font-size: 44px !important; }
    .c-section-head { grid-template-columns: 1fr !important; gap: 24px !important; margin-bottom: 48px !important; }
    .c-services { grid-template-columns: 1fr !important; }
    .c-gallery-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .c-barbers { grid-template-columns: repeat(2, 1fr) !important; }
    .c-barber-pick { grid-template-columns: repeat(2, 1fr) !important; }
    .c-date-grid { grid-template-columns: repeat(4, 1fr) !important; }
    .c-time-grid { grid-template-columns: repeat(3, 1fr) !important; }
    .c-input-row { grid-template-columns: 1fr !important; }
    .c-booking { grid-template-columns: 1fr !important; }
    .c-story { grid-template-columns: 1fr !important; gap: 32px !important; }
    .c-ba { grid-template-columns: 1fr !important; gap: 32px !important; }
    .c-testimonials { grid-template-columns: 1fr !important; }
    .c-location { grid-template-columns: 1fr !important; }
    .c-ig { grid-template-columns: repeat(3, 1fr) !important; }
    .c-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
    .c-footer-bottom { flex-direction: column; gap: 8px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="classic-prototype.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "tagline": "The poise of a gentleman",
  "headingFont": "'Fraunces', serif",
  "palettePreset": "wood-brass"
}/*EDITMODE-END*/;

const PALETTES = {
  'wood-brass':   { label: 'Wood & Brass (default)', vars: { '--bg': '#0e0c0a', '--bg-2': '#16110d', '--bg-card': '#1a1410', '--brass': '#b08d4f', '--brass-bright': '#d4ae6f', '--cream': '#e8dcc4', '--cream-soft': '#c9b88f' } },
  'forest-gold':  { label: 'Forest & Gold',           vars: { '--bg': '#0c1410', '--bg-2': '#0f1a14', '--bg-card': '#13201a', '--brass': '#a8895c', '--brass-bright': '#cdb079', '--cream': '#f0ead6', '--cream-soft': '#bfb091' } },
  'wine-gold':    { label: 'Wine & Gold',             vars: { '--bg': '#0e0808', '--bg-2': '#160c0c', '--bg-card': '#1a1010', '--brass': '#c9a96e', '--brass-bright': '#e6c98e', '--cream': '#f0e6d4', '--cream-soft': '#c9b89c' } },
  'midnight-silver': { label: 'Midnight & Silver',    vars: { '--bg': '#0a0d14', '--bg-2': '#0e1220', '--bg-card': '#121828', '--brass': '#9aa3b8', '--brass-bright': '#c7cee0', '--cream': '#e8e8f0', '--cream-soft': '#a8aec0' } },
};

const HEADING_FONTS = [
  { value: "'Fraunces', serif",            label: 'Fraunces (default)' },
  { value: "'Cormorant Garamond', serif",  label: 'Cormorant Garamond' },
  { value: "'Italiana', serif",            label: 'Italiana' },
];

const TAGLINES = [
  'The poise of a gentleman',
  'Where gentlemen find their style',
  'British tradition · Vietnamese soul',
  'More than a barbershop',
];

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const p = PALETTES[tweaks.palettePreset] || PALETTES['wood-brass'];
    const root = document.querySelector('.classic-root');
    if (!root) return;
    Object.entries(p.vars).forEach(([k, v]) => root.style.setProperty(k, v));
  }, [tweaks.palettePreset]);

  const onBook = () => {
    const el = document.getElementById('booking');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <>
      <ClassicPrototype tweaks={{ tagline: tweaks.tagline, headingFont: tweaks.headingFont }} onBook={onBook} />

      <TweaksPanel title="Tweaks · Bảnh Barber">
        <TweakSection label="Palette" />
        <TweakSelect
          label="Preset"
          value={tweaks.palettePreset}
          onChange={(v) => setTweak('palettePreset', v)}
          options={Object.entries(PALETTES).map(([k, v]) => ({ value: k, label: v.label }))}
        />
        <TweakSection label="Typography" />
        <TweakSelect
          label="Heading font"
          value={tweaks.headingFont}
          onChange={(v) => setTweak('headingFont', v)}
          options={HEADING_FONTS}
        />
        <TweakSection label="Tagline" />
        <TweakSelect
          label="Preset"
          value={tweaks.tagline}
          onChange={(v) => setTweak('tagline', v)}
          options={TAGLINES.map(t => ({ value: t, label: t }))}
        />
        <TweakText
          label="Custom"
          value={tweaks.tagline}
          onChange={(v) => setTweak('tagline', v)}
        />
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
