server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;

    # Health check
    location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Landing page
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ── em-tho ──────────────────────────────────────────────────────────────
    location ^~ /em-tho {
        alias /usr/share/nginx/html/em-tho;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        try_files $uri $uri/ /em-tho/index.html;
    }

    # ── banh-barber ──────────────────────────────────────────────────────────
    location ^~ /banh-barber {
        alias /usr/share/nginx/html/banh-barber;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        try_files $uri $uri/ /banh-barber/index.html;
    }

    # ── bhuda ────────────────────────────────────────────────────────────────
    location ^~ /bhuda {
        alias /usr/share/nginx/html/bhuda;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        try_files $uri $uri/ /bhuda/index.html;
    }

    # ── new project template ─────────────────────────────────────────────────
    # Copy the block above, replace the slug, then:
    #   1. Add the COPY line in Dockerfile
    #   2. Add a card in index.html
