<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bao Demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f0f0f;
        color: #e8e8e8;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: #fff;
      }

      header p {
        margin-top: 0.5rem;
        color: #888;
        font-size: 0.95rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 1rem;
        width: 100%;
        max-width: 800px;
      }

      .card {
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        padding: 1.5rem;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.15s, background 0.15s;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .card:hover {
        border-color: #444;
        background: #222;
      }

      .card-name {
        font-weight: 600;
        font-size: 1rem;
        color: #fff;
      }

      .card-path {
        font-size: 0.8rem;
        color: #555;
        font-family: monospace;
      }

      .card-desc {
        font-size: 0.85rem;
        color: #888;
        margin-top: 0.25rem;
      }

      footer {
        margin-top: 4rem;
        color: #444;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Bao Demo</h1>
      <p>bao.demo.vn</p>
    </header>

    <div class="grid">
      <a class="card" href="/em-tho/">
        <span class="card-name">Em Tho</span>
        <span class="card-path">/em-tho</span>
        <span class="card-desc">Demo project</span>
      </a>

      <a class="card" href="/banh-barber/">
        <span class="card-name">Banh Barber</span>
        <span class="card-path">/banh-barber</span>
        <span class="card-desc">Demo project</span>
      </a>

      <!-- New project: copy the <a> block above and update name/path/desc -->
    </div>

    <footer>bao.demo.vn &mdash; internal demos</footer>
  </body>
</html>
