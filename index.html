<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bao Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #f7f5f2;
        --surface: #ffffff;
        --border: #e4e0da;
        --text: #2a2420;
        --muted: #a09890;
        --accent: #c0392b;
      }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        -webkit-font-smoothing: antialiased;
      }

      /* ── HEADER ───────────────────────────────────────── */
      header {
        padding: 2.5rem 3rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .logo em {
        font-style: italic;
        color: var(--accent);
      }

      .header-tag {
        font-size: 0.7rem;
        font-weight: 400;
        color: var(--muted);
        letter-spacing: 0.06em;
      }

      /* ── HERO ─────────────────────────────────────────── */
      .hero {
        padding: 5rem 3rem 4rem;
        border-bottom: 1px solid var(--border);
      }

      .hero-inner {
        max-width: 600px;
      }

      .hero h2 {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(2.8rem, 5vw, 4.5rem);
        font-weight: 400;
        line-height: 1.08;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 1.5rem;
      }

      .hero h2 em {
        font-style: italic;
        color: var(--accent);
      }

      .hero p {
        font-size: 0.9rem;
        font-weight: 300;
        color: var(--muted);
        line-height: 1.75;
        max-width: 420px;
      }

      /* ── CATALOG ──────────────────────────────────────── */
      .catalog {
        padding: 0 3rem 4rem;
      }

      .catalog-header {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 2rem 0 1.5rem;
        border-bottom: 1px solid var(--border);
        margin-bottom: 0;
      }

      .catalog-header span {
        font-size: 0.65rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted);
      }

      .catalog-header::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* ── GRID ─────────────────────────────────────────── */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      .card {
        padding: 2.25rem 2rem;
        border-right: 1px solid var(--border);
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        gap: 0;
        position: relative;
        overflow: hidden;
        transition: background 0.2s;
      }

      .card:last-of-type { border-right: none; }

      .card::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 2px;
        background: var(--accent);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.3s ease;
      }

      .card:hover { background: #faf8f5; }
      .card:hover::after { transform: scaleX(1); }
      .card:hover .card-arrow { opacity: 1; transform: translate(3px, -3px); }

      .card-num {
        font-size: 0.62rem;
        font-weight: 400;
        color: var(--muted);
        letter-spacing: 0.1em;
        margin-bottom: 2rem;
      }

      .card-name {
        font-family: 'Cormorant Garamond', serif;
        font-size: 1.9rem;
        font-weight: 600;
        color: var(--text);
        line-height: 1.1;
        letter-spacing: -0.01em;
        margin-bottom: 0.75rem;
      }

      .card-tag {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent);
        background: rgba(192, 57, 43, 0.07);
        padding: 0.25rem 0.6rem;
        border-radius: 2px;
        margin-bottom: 1rem;
        align-self: flex-start;
      }

      .card-desc {
        font-size: 0.8rem;
        font-weight: 300;
        color: var(--muted);
        line-height: 1.65;
        flex: 1;
      }

      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 2rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border);
      }

      .card-link {
        font-size: 0.72rem;
        font-weight: 500;
        color: var(--text);
        letter-spacing: 0.02em;
      }

      .card-arrow {
        font-size: 1rem;
        color: var(--accent);
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        line-height: 1;
      }

      /* ── FOOTER ───────────────────────────────────────── */
      footer {
        padding: 2rem 3rem;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      footer p {
        font-size: 0.72rem;
        color: var(--muted);
        font-weight: 300;
      }

      /* ── RESPONSIVE ───────────────────────────────────── */
      @media (max-width: 768px) {
        header, .hero, .catalog, footer { padding-left: 1.5rem; padding-right: 1.5rem; }
        .hero { padding-top: 3rem; }
        .catalog { padding-bottom: 2.5rem; }
        .grid { grid-template-columns: 1fr; border-left: none; border-right: none; }
        .card { border-right: none; border-bottom: 1px solid var(--border); }
        .card:last-of-type { border-bottom: none; }
      }

      @media (min-width: 769px) and (max-width: 1024px) {
        .grid { grid-template-columns: repeat(2, 1fr); }
        .card:nth-child(2n) { border-right: none; }
        .card:nth-child(n+3) { border-top: 1px solid var(--border); }
      }
    </style>
  </head>
  <body>

    <header>
      <div class="logo">Bao<em>.</em></div>
      <span class="header-tag">bao.demo.vn</span>
    </header>

    <div>
      <div class="hero">
        <div class="hero-inner">
          <h2>Những dự án<br/><em>nhỏ, đáng yêu.</em></h2>
          <p>Tập hợp các demo và prototype — mỗi dự án một câu chuyện, một phong cách riêng.</p>
        </div>
      </div>

      <div class="catalog">
        <div class="catalog-header">
          <span>Tất cả dự án</span>
        </div>

        <div class="grid">
          <a class="card" href="/em-tho/">
            <span class="card-num">01</span>
            <span class="card-name">Em Tho</span>
            <span class="card-tag">Demo</span>
            <span class="card-desc">Demo project</span>
            <div class="card-footer">
              <span class="card-link">Xem ngay</span>
              <span class="card-arrow">↗</span>
            </div>
          </a>

          <a class="card" href="/banh-barber/">
            <span class="card-num">02</span>
            <span class="card-name">Banh Barber</span>
            <span class="card-tag">Demo</span>
            <span class="card-desc">Demo project</span>
            <div class="card-footer">
              <span class="card-link">Xem ngay</span>
              <span class="card-arrow">↗</span>
            </div>
          </a>

          <a class="card" href="/bhuda/">
            <span class="card-num">03</span>
            <span class="card-name">Bhuda</span>
            <span class="card-tag">Demo</span>
            <span class="card-desc">Demo project</span>
            <div class="card-footer">
              <span class="card-link">Xem ngay</span>
              <span class="card-arrow">↗</span>
            </div>
          </a>

          <!-- New project: copy the <a> block above and update num/name/desc -->
        </div>
      </div>
    </div>

    <footer>
      <p>bao.demo.vn</p>
      <p>&copy; 2025</p>
    </footer>

  </body>
</html>
